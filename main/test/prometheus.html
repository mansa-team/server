<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mansa</title>
    
    <link rel="icon" type="image/x-icon" href="https://mansa-team.github.io/icons/icons/MANSA.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">

    <style>
        * { box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: #fff;
            color: #000;
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .sidebar {
            flex-shrink: 0;
            border-bottom: 2px solid #000;
            padding: 10px 0 20px 0;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .main-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
            gap: 20px;
            min-height: 0; /* Permite que os filhos respeitem o overflow: hidden */
        }

        .sessions-sidebar {
            flex-shrink: 0;
            width: 260px;
            background: #fdfdfd;
            border: 1px solid #eee;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            padding: 15px;
            overflow: hidden;
        }

        .sessions-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            border: 1px solid #eee;
            padding: 20px;
            background: #fafafa;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            gap: 20px;
        }

        .input-wrapper {
            flex-shrink: 0;
            width: 100%;
        }

        .session-item {
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            border: 1px solid transparent;
            transition: all 0.2s;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .session-item .delete-btn, .session-item .edit-btn {
            opacity: 0;
            transition: opacity 0.2s;
            color: #999;
            padding: 4px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            margin-left: 4px;
        }

        .session-item:hover .delete-btn, .session-item:hover .edit-btn {
            opacity: 1;
        }

        .delete-btn:hover {
            background: #ffebee;
            color: #d32f2f;
        }

        .edit-btn:hover {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .session-item:hover {
            background: #f0f0f0;
        }

        .session-item.active {
            background: #fff;
            border-color: #000;
            font-weight: 600;
        }

        .new-chat-btn {
            width: 100%;
            padding: 10px;
            background: #000;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .message {
            margin-bottom: 24px;
            padding: 15px;
            border-radius: 12px;
            max-width: 85%;
            line-height: 1.6;
        }

        .message.user { 
            background: #000; 
            color: #fff;
            align-self: flex-end;
            margin-left: auto;
        }
        
        .message.assistant { 
            background: #fff; 
            border: 1px solid #eee;
            align-self: flex-start;
        }

        .avatar { font-weight: bold; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
        .avatar span { font-size: 18px; }

        .input-wrapper {
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
        }

        .input-box {
            display: flex;
            gap: 12px;
            align-items: flex-end;
            background: #fff;
            padding: 12px 16px;
            border: 2px solid #000;
            border-radius: 16px;
            box-shadow: 4px 4px 0px #000;
        }

        .input-box textarea {
            flex: 1;
            padding: 8px;
            border: none;
            outline: none;
            resize: none;
            max-height: 200px;
            font-family: inherit;
            font-size: 14px;
            line-height: 1.5;
            overflow-y: auto;
        }

        .settings-group { display: inline-block; margin-right: 20px; }
        .settings-group label { display: block; font-size: 10px; }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="settings-group">
            <label>API Prometheus</label>
            <input type="text" id="apiEndpoint" value="http://localhost:3200/prometheus">
        </div>
        <div class="settings-group">
            <label>Sessão Atual</label>
            <input type="text" id="sessionId" placeholder="Auto-gerado" readonly style="background: #f0f0f0; border-color: #ccc;">
        </div>
        <div class="settings-group" id="userDisplay" style="margin-left: auto; display: flex; align-items: center; gap: 8px;">
            <span class="material-icons" style="font-size: 20px;">account_circle</span>
            <span id="usernameLabel" style="font-weight: 600; font-size: 14px;">Visitante</span>
        </div>
        <button onclick="clearChat()">Limpar Tela</button>
    </aside>

    <div class="main-layout">
        <!-- Sessions Sidebar (ChatGPT Style) -->
        <aside class="sessions-sidebar">
            <button class="new-chat-btn" onclick="startNewChat()">
                <span class="material-icons">add</span>
                Nova Conversa
            </button>
            <div class="sessions-header">Sessões Recentes</div>
            <div class="sessions-list" id="sessionsList">
                <!-- Session items will be injected here -->
                <div style="font-size: 11px; color: #999; text-align: center; padding: 20px;">Carregando sessões...</div>
            </div>
        </aside>

        <main class="main-content" style="flex: 1; display: flex; flex-direction: column;">
            <div class="chat-container" id="chatContainer">
                <!-- Messages go here -->
                <div class="message assistant">
                    <div class="avatar assistant">
                        <span class="material-icons">smart_toy</span>
                        Prometheus
                    </div>
                    <div class="message-body">
                        Ola! Sou o <strong>Prometheus</strong>, sua inteligência financeira da Mansa. Selecione uma sessão ao lado ou inicie uma nova análise!
                    </div>
                </div>
            </div>

            <div class="input-wrapper">
                <div class="input-box">
                    <textarea id="userInput" placeholder="Faça uma pergunta sobre o mercado financeiro..." rows="1" autocomplete="off"></textarea>
                    <button id="sendBtn" class="icon-btn send" title="Enviar Mensagem">
                        <span class="material-icons">send</span>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <script>
        const chatContainer = document.getElementById('chatContainer');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const apiEndpointInput = document.getElementById('apiEndpoint');
        const sessionIdInput = document.getElementById('sessionId');
        const sessionsList = document.getElementById('sessionsList');

        // Configure Marked
        marked.setOptions({
            highlight: function(code, lang) {
                if (lang && hljs.getLanguage(lang)) {
                    return hljs.highlight(code, { language: lang }).value;
                }
                return hljs.highlightAuto(code).value;
            },
            breaks: true,
            gfm: true
        });

        // Initialize session browsing
        window.addEventListener('load', () => {
            fetchUserInfo();
            fetchSessions();
        });

        async function fetchUserInfo() {
            try {
                const token = localStorage.getItem('mansa_token');
                if (!token) {
                    console.warn("Nenhum token encontrado no localStorage.");
                    return;
                }
                const baseUrl = apiEndpointInput.value.replace(/\/prometheus$/, "");
                const response = await fetch(`${baseUrl}/user/me`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                const data = await response.json();
                if (data.username) {
                    document.getElementById('usernameLabel').textContent = data.username;
                }
            } catch (err) {
                console.error("Erro ao buscar usuário:", err);
            }
        }

        async function fetchSessions() {
            try {
                const token = localStorage.getItem('mansa_token');
                if (!token) {
                    sessionsList.innerHTML = `<div style="color:orange; font-size:10px; cursor:pointer;" onclick="window.location.href='auth.html'">Login Necessário</div>`;
                    return;
                }
                const baseUrl = apiEndpointInput.value.replace(/\/$/, "");
                const response = await fetch(`${baseUrl}/sessions`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                const data = await response.json();
                
                if (data.success) {
                    renderSessions(data.sessions);
                } else if (response.status === 401) {
                    sessionsList.innerHTML = `<div style="color:orange; font-size:10px; cursor:pointer;" onclick="window.location.href='auth.html'">Login Necessário</div>`;
                }
            } catch (err) {
                sessionsList.innerHTML = `<div style="color:red; font-size:10px;">Erro ao carregar: ${err.message}</div>`;
            }
        }

        function renderSessions(sessions) {
            sessionsList.innerHTML = '';
            if (sessions.length === 0) {
                sessionsList.innerHTML = '<div style="font-size: 11px; color: #999; text-align: center; padding: 10px;">Sem sessões</div>';
                return;
            }

            sessions.forEach(session => {
                const div = document.createElement('div');
                div.className = `session-item ${session.sessionId === sessionIdInput.value ? 'active' : ''}`;
                div.title = session.title || 'Sem título';
                
                const titleSpan = document.createElement('span');
                titleSpan.textContent = session.title || 'Conversa Antiga';
                titleSpan.style.flex = "1";
                titleSpan.style.overflow = "hidden";
                titleSpan.style.textOverflow = "ellipsis";
                titleSpan.style.pointerEvents = "none";

                // Edit Button
                const editBtn = document.createElement('span');
                editBtn.className = "material-icons edit-btn";
                editBtn.innerHTML = "edit";
                editBtn.title = "Renomear Chat";
                editBtn.style.fontSize = "18px";
                editBtn.style.cursor = "pointer";
                editBtn.onclick = (e) => {
                    e.stopPropagation();
                    const newTitle = prompt("Novo título para esta sessão:", session.title);
                    if (newTitle && newTitle !== session.title) {
                        renameChatSession(session.sessionId, newTitle);
                    }
                };
                
                const deleteBtn = document.createElement('span');
                deleteBtn.className = "material-icons delete-btn";
                deleteBtn.innerHTML = "delete_outline";
                deleteBtn.title = "Excluir Chat";
                deleteBtn.style.fontSize = "18px";
                deleteBtn.style.cursor = "pointer";
                deleteBtn.onclick = (e) => {
                    e.stopPropagation();
                    if(confirm("Deseja realmente excluir esta conversa?")) {
                        deleteChatSession(session.sessionId);
                    }
                };
                
                div.onclick = () => selectSession(session.sessionId);

                div.appendChild(titleSpan);
                div.appendChild(editBtn);
                div.appendChild(deleteBtn);
                sessionsList.appendChild(div);
            });
        }

        async function renameChatSession(sessionId, newTitle) {
            try {
                const token = localStorage.getItem('mansa_token');
                const baseUrl = apiEndpointInput.value.replace(/\/$/, "");
                const response = await fetch(`${baseUrl}/sessions/${sessionId}`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ title: newTitle })
                });
                const data = await response.json();
                if (data.success) {
                    fetchSessions(); // Soft-reload: refresh list
                } else {
                    alert("Erro ao renomear: " + (data.error || "Desconhecido"));
                }
            } catch (err) {
                alert("Erro de conexão: " + err.message);
            }
        }

        async function deleteChatSession(sessionId) {
            try {
                const token = localStorage.getItem('mansa_token');
                const baseUrl = apiEndpointInput.value.replace(/\/$/, "");
                const response = await fetch(`${baseUrl}/sessions/${sessionId}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                const data = await response.json();
                if (data.success) {
                    if (sessionIdInput.value === sessionId) {
                        startNewChat();
                    }
                    fetchSessions();
                } else {
                    alert("Erro ao excluir: " + (data.error || "Desconhecido"));
                }
            } catch (err) {
                alert("Erro de conexão: " + err.message);
            }
        }

        async function selectSession(sessionId) {
            sessionIdInput.value = sessionId;
            document.querySelectorAll('.session-item').forEach(el => el.classList.remove('active'));
            // Refetch messages for this session
            await fetchHistory(sessionId);
            fetchSessions(); // Refresh list to update active state
        }

        function startNewChat() {
            sessionIdInput.value = '';
            chatContainer.innerHTML = '';
            addMessage('Iniciando uma nova conversa do zero. Como posso ajudar com sua tese de investimentos?', 'assistant');
            document.querySelectorAll('.session-item').forEach(el => el.classList.remove('active'));
        }

        function addMessage(content, role) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            
            const avatar = document.createElement('div');
            avatar.className = `avatar ${role}`;
            avatar.innerHTML = `<span class="material-icons">${role === 'user' ? 'person' : 'smart_toy'}</span> ${role === 'user' ? 'Você' : 'Prometheus'}`;
            
            const messageBody = document.createElement('div');
            messageBody.className = 'message-body';
            
            if (role === 'assistant') {
                // Process Charts
                let processedContent = content.replace(/<chart\s+config=(['"])(.*?)\1\s*\/?>/g, (match, quote, configStr) => {
                    const id = 'chart-' + Math.random().toString(36).substr(2, 9);
                    setTimeout(() => renderChart(id, configStr), 100);
                    return `<div id="${id}" class="chart-wrapper" style="min-height: 250px; margin: 20px 0;"></div>`;
                });

                const cleanHTML = DOMPurify.sanitize(marked.parse(processedContent));
                messageBody.innerHTML = cleanHTML;
            } else {
                messageBody.textContent = content;
            }

            messageDiv.appendChild(avatar);
            messageDiv.appendChild(messageBody);
            chatContainer.appendChild(messageDiv);
            
            messageBody.querySelectorAll('pre code').forEach(hljs.highlightElement);
            scrollToBottom();
        }

        function renderChart(containerId, configStr) {
            const container = document.getElementById(containerId);
            try {
                let cleanStr = configStr.trim().replace(/&quot;/g, '"');
                const config = JSON.parse(cleanStr);
                
                const trace = {
                    x: config.data.labels,
                    y: config.data.datasets[0].data,
                    type: config.type || 'bar',
                    marker: { color: '#000' }
                };

                const layout = {
                    height: 280,
                    margin: { t: 10, b: 30, l: 30, r: 10 }
                };

                Plotly.newPlot(container, [trace], layout, { responsive: true, displayModeBar: false });
            } catch (e) {
                container.innerHTML = 'Erro gráfico';
            }
        }

        async function handleSend() {
            const text = userInput.value.trim();
            if (!text) return;

            addMessage(text, 'user');
            userInput.value = '';
            
            const loadingId = 'loading-' + Date.now();
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'message assistant';
            loadingDiv.id = loadingId;
            loadingDiv.innerHTML = `
                <div class="avatar assistant"><span class="material-icons">smart_toy</span> Prometheus</div>
                <div class="message-body">
                    <div class="typing-indicator">
                        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
                    </div>
                </div>
            `;
            chatContainer.appendChild(loadingDiv);
            scrollToBottom();

            try {
                const baseUrl = apiEndpointInput.value.replace(/\/$/, "");
                const response = await fetch(`${baseUrl}/chat`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${localStorage.getItem('mansa_token')}`
                    },
                    body: JSON.stringify({
                        text: text,
                        sessionId: sessionIdInput.value || null
                    })
                });

                const data = await response.json();
                document.getElementById(loadingId).remove();

                if (data.success) {
                    addMessage(data.response, 'assistant');
                    if (data.sessionId && !sessionIdInput.value) {
                        sessionIdInput.value = data.sessionId;
                        fetchSessions(); // Refresh list to show the new session
                    }
                } else {
                    addMessage(`**Erro:** ${data.error || 'Falha na requisição'}`, 'assistant');
                }
            } catch (err) {
                const loader = document.getElementById(loadingId);
                if (loader) loader.remove();
                addMessage(`**Erro de Conexão:** ${err.message}`, 'assistant');
            }
        }

        async function fetchHistory(sessionId) {
            if (!sessionId) return;
            try {
                const baseUrl = apiEndpointInput.value.replace(/\/$/, "");
                const response = await fetch(`${baseUrl}/history/${sessionId}`, {
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('mansa_token')}`
                    }
                });
                const data = await response.json();
                
                if (data.success) {
                    chatContainer.innerHTML = '';
                    data.history.forEach(msg => {
                        // The backend returns the raw JSON database structure: {role, content, timestamp, metadata}
                        const content = msg.content || (msg.parts && msg.parts[0].text);
                        if (content) {
                            addMessage(content, msg.role === 'user' ? 'user' : 'assistant');
                        }
                    });
                }
            } catch (e) {
                console.error("Erro ao buscar histórico:", e);
            }
        }

        function scrollToBottom() {
            chatContainer.scrollTo({
                top: chatContainer.scrollHeight,
                behavior: 'smooth'
            });
        }

        function clearChat() {
            chatContainer.innerHTML = '';
            addMessage('Chat limpo. Como posso ajudar agora?', 'assistant');
        }

        function adjustTextareaHeight() {
            userInput.style.height = 'auto';
            userInput.style.height = (userInput.scrollHeight) + 'px';
        }

        userInput.addEventListener('input', adjustTextareaHeight);

        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSend();
                userInput.style.height = 'auto';
            }
        });

        sendBtn.addEventListener('click', () => {
            handleSend();
            userInput.style.height = 'auto';
        });
    </script>
</body>
</html>
